services:
  # ── Django Backend ─────────────────────────────────────────────────────────
  - type: web
    name: instafood-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py migrate
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SQLITE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
